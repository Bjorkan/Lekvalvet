site_name: Lekvalvet
site_url: https://mydomain.org/mysite
copyright: >
  💡 <strong>Licens:</strong> Innehållet i Lekvalvet är publicerat under
  <a href="https://creativecommons.org/publicdomain/zero/1.0/deed.sv" target="_blank">CC0 1.0 Universell</a>.
  Det är fritt att använda, ändra och dela utan begränsningar.
plugins:
  - meta
  - tags
  - search
theme:
  name: material
  language: sv
  icon:
    logo: fontawesome/solid/people-group
  features:
    - navigation.footer
  palette:

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      toggle:
        icon: material/brightness-7
        name: Byt till mörkt läge

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      toggle:
        icon: material/brightness-4
        name: Byt till ljust läge
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Bjorkan/Lekvalvet
